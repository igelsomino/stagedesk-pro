<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Accesso completato - StageDesk Pro</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101014;
        color: #f5f2eb;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background:
          linear-gradient(180deg, rgba(16, 16, 20, 0.68), rgba(16, 16, 20, 0.94)),
          radial-gradient(circle at 50% 0%, rgba(173, 73, 53, 0.22), transparent 42%),
          #101014;
      }

      main {
        width: min(440px, calc(100vw - 32px));
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        padding: 28px;
        background: rgba(24, 24, 30, 0.86);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.46);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.35rem;
      }

      p {
        margin: 0 0 18px;
        color: #c7c2b8;
        line-height: 1.55;
      }

      a {
        color: #f3c36b;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Accesso completato</h1>
      <p>StageDesk Pro sta completando l'autenticazione. Se l'app non si apre automaticamente, usa il collegamento qui sotto.</p>
      <a id="open-app" href="stagedeskpro://auth-callback">Apri StageDesk Pro</a>
    </main>
    <script>
      const callbackPath = `${window.location.search || ""}${window.location.hash || ""}`;
      const appUrl = `stagedeskpro://auth-callback${callbackPath}`;
      const link = document.getElementById("open-app");
      link.href = appUrl;
      window.setTimeout(() => {
        window.location.href = appUrl;
      }, 250);
    </script>
  </body>
</html>
