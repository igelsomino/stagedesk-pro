<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Autenticazione completata - StageDesk Pro</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101014;
        color: #f5f2eb;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background:
          linear-gradient(180deg, rgba(16, 16, 20, 0.68), rgba(16, 16, 20, 0.94)),
          radial-gradient(circle at 50% 0%, rgba(173, 73, 53, 0.22), transparent 42%),
          #101014;
      }

      main {
        width: min(440px, calc(100vw - 32px));
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        padding: 28px;
        background: rgba(24, 24, 30, 0.86);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.46);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.35rem;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: #ff7a42;
        font-size: 0.72rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      p {
        margin: 0 0 18px;
        color: #c7c2b8;
        line-height: 1.55;
      }

      a {
        color: #f3c36b;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">StageDesk Pro</p>
      <h1>Autenticazione completata</h1>
      <p id="status">StageDesk Pro sta completando l'accesso. Puoi chiudere questa finestra dopo l'apertura dell'app.</p>
      <a id="open-app" href="stagedeskpro://auth-callback">Riapri StageDesk Pro</a>
      <iframe id="app-launch" title="Avvio StageDesk Pro" hidden></iframe>
    </main>
    <script data-cfasync="false">
      const callbackPath = `${window.location.search || ""}${window.location.hash || ""}`;
      const appUrl = `stagedeskpro://auth-callback${callbackPath}`;
      const link = document.getElementById("open-app");
      const status = document.getElementById("status");
      const launcher = document.getElementById("app-launch");
      link.href = appUrl;
      window.setTimeout(() => {
        status.textContent = "Autenticazione completata. Ora puoi chiudere questa finestra del browser dopo l'apertura di StageDesk Pro.";
        launcher.src = appUrl;
        window.setTimeout(() => {
          status.textContent = "Se StageDesk Pro non si è aperto, fai clic su Riapri StageDesk Pro. Dopo l'apertura puoi chiudere questa finestra del browser.";
        }, 1800);
      }, 300);
    </script>
  </body>
</html>
