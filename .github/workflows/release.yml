name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versione da pubblicare, senza prefisso v"
        required: true
        default: "1.0.17"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare GitHub Release
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag version
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
          else
            TAG_VERSION="${{ github.event.inputs.version }}"
          fi
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Release $TAG_VERSION non allineata con package.json $PACKAGE_VERSION"
            exit 1
          fi

      - name: Create or reuse release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="v${{ github.event.inputs.version }}"
          fi

          RELEASE_ID="$(gh release view "$TAG" --json databaseId --jq .databaseId 2>/dev/null || true)"
          if [ -z "$RELEASE_ID" ]; then
            RELEASE_ID="$(
              gh api "repos/${GITHUB_REPOSITORY}/releases" \
                -f tag_name="$TAG" \
                -f target_commitish="$GITHUB_SHA" \
                -f name="StageDesk Pro $TAG" \
                -f body="Release desktop di StageDesk Pro. Il file latest.json alimenta l'aggiornamento automatico dell'app." \
                -F draft=false \
                -F prerelease=false \
                --jq .id
            )"
          fi

          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag version
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
          else
            TAG_VERSION="${{ github.event.inputs.version }}"
          fi
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Release $TAG_VERSION non allineata con package.json $PACKAGE_VERSION"
            exit 1
          fi

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            libasound2-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            xdg-utils

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        with:
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v{0}', github.event.inputs.version) }}
          releaseName: StageDesk Pro ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v{0}', github.event.inputs.version) }}
          releaseBody: "Release desktop di StageDesk Pro. Il file latest.json alimenta l'aggiornamento automatico dell'app."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  normalize-latest-json:
    name: Normalize updater metadata
    runs-on: ubuntu-22.04
    needs: publish
    if: ${{ needs.publish.result == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="v${{ github.event.inputs.version }}"
          fi

          mkdir -p release-signatures
          gh release download "$TAG" --pattern latest.json --output latest.json --clobber
          gh release download "$TAG" --pattern "*.sig" --dir release-signatures --clobber
          node scripts/normalize-latest-json.mjs latest.json release-signatures
          gh release upload "$TAG" latest.json --clobber
